bg3 = "#665c54"
fg0 = "#fbf1c7"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"

[os]
disabled = false
format = "[¯é░](fg:bg0 bg:red)[ $symbol ]($style)"
style = "bg:red fg:fg0 bold"

[os.symbols]
Arch = "´îâ"
Debian = "´îå"
Fedora = "´îè"
Linux = "´à╝"
Macos = "´à╣"
Mint = "¾░ú¡"
Pop = "´î¬"
