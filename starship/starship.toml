format = """
$os\
$username\
$directory\
[¯é░](fg:yellow bg:green)\
$git_branch\
$git_status\
$git_state\
[¯é░](fg:green bg:blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
